<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>衆議院議員単語帳</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">House Of Representatives Flashcards</p>
          <h1>衆議院議員 学習カード</h1>
          <p class="hero-copy">
            完成見本1名を基準に、20名・50名単位で安全に拡張できる構造を先に固める。
          </p>
        </div>
        <dl class="hero-stats">
          <div>
            <dt>今回の実装</dt>
            <dd>完成見本 1名</dd>
          </div>
          <div>
            <dt>最終目標</dt>
            <dd>465名</dd>
          </div>
        </dl>
      </header>

      <section class="workspace">
        <section class="study-panel" aria-labelledby="study-title">
          <div class="section-heading">
            <div>
              <p class="section-label">学習画面</p>
              <h2 id="study-title">単語帳カード</h2>
            </div>
            <p id="member-count" class="muted-text">読み込み中...</p>
          </div>

          <div class="card-controls">
            <button id="prev-button" type="button">前へ</button>
            <button id="flip-button" type="button">めくる</button>
            <button id="next-button" type="button">次へ</button>
          </div>

          <article
            id="flashcard"
            class="flashcard"
            data-side="front"
            aria-live="polite"
            aria-label="議員カード"
          ></article>

          <p id="card-status" class="card-status">読み込み中...</p>

          <div class="future-controls" aria-label="将来拡張用の操作">
            <button id="shuffle-button" type="button" disabled>ランダム</button>
            <button id="mastered-button" type="button" disabled>学習済み</button>
            <button id="focus-button" type="button" disabled>苦手登録</button>
          </div>

          <p class="hint-text">
            カード本体をタップしても表裏を切り替えできます。将来拡張の操作は土台だけ先に配置しています。
          </p>
        </section>

        <aside class="list-panel" aria-labelledby="list-title">
          <div class="section-heading">
            <div>
              <p class="section-label">一覧画面</p>
              <h2 id="list-title">議員リスト</h2>
            </div>
            <p class="muted-text">絞り込みの土台つき</p>
          </div>

          <form class="filters" aria-label="絞り込み条件">
            <label>
              政党
              <select id="filter-party" name="party"></select>
            </label>
            <label>
              選出区分
              <select id="filter-election" name="electionType"></select>
            </label>
            <label>
              都道府県
              <select id="filter-prefecture" name="prefecture"></select>
            </label>
            <label>
              比例ブロック
              <select id="filter-block" name="block"></select>
            </label>
          </form>

          <div id="member-list" class="member-list" aria-live="polite"></div>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
